<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ガチャンコ</title>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .gc-wrap{background:#f5f0e8;min-height:100vh;padding:24px 16px 40px;font-family:'Noto Sans JP',sans-serif;color:#2a2a2a}
    .gc-machine{max-width:360px;margin:0 auto;background:#fff;border-radius:24px;border:3px solid #c9a84c;padding:0 0 24px;box-shadow:0 4px 0 #c9a84c,0 8px 24px #c9a84c33}
    .gc-header{background:#c9a84c;border-radius:20px 20px 0 0;padding:16px 20px 12px;text-align:center}
    .gc-title{font-family:'Dela Gothic One',sans-serif;font-size:28px;color:#fff;letter-spacing:4px;margin:0}
    .gc-globe-area{display:flex;justify-content:center;padding:20px 0 8px}
    .gc-body{padding:0 20px}
    .gc-section{margin-bottom:16px}
    .gc-label{font-size:11px;color:#c9a84c;letter-spacing:2px;margin-bottom:8px;display:block;font-weight:700}
    .gc-select{width:100%;padding:10px 12px;background:#faf7f2;border:1.5px solid #c9a84c55;border-radius:10px;color:#2a2a2a;font-family:'Noto Sans JP',sans-serif;font-size:14px;box-sizing:border-box}
    .gc-select:focus{outline:none;border-color:#c9a84c}
    .gc-tags{display:flex;flex-wrap:wrap;gap:8px}
    .gc-tag{background:transparent;border:1.5px solid #c9a84c66;color:#c9a84c;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
    .gc-tag.on{background:#c9a84c;border-color:#c9a84c;color:#fff;font-weight:700}
    .gc-input{width:100%;padding:10px 12px;background:#faf7f2;border:1.5px solid #c9a84c55;border-radius:10px;color:#2a2a2a;font-family:'Noto Sans JP',sans-serif;font-size:14px;box-sizing:border-box}
    .gc-input::placeholder{color:#c9a84c66}
    .gc-input:focus{outline:none;border-color:#c9a84c}
    .gc-divider{border:none;border-top:1px dashed #c9a84c44;margin:16px 0}
    .gc-people-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .gc-counter{background:#faf7f2;border:1.5px solid #c9a84c55;border-radius:12px;padding:10px 12px}
    .gc-counter-label{font-size:11px;color:#888;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .gc-counter-ctrl{display:flex;align-items:center;justify-content:space-between}
    .gc-cnt-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid #c9a84c;background:transparent;color:#c9a84c;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:'Noto Sans JP',sans-serif}
    .gc-cnt-btn:hover{background:#c9a84c;color:#fff}
    .gc-cnt-val{font-family:'Dela Gothic One',sans-serif;font-size:20px;color:#2a2a2a;min-width:24px;text-align:center}
    .gc-cnt-unit{font-size:11px;color:#888;margin-left:2px}
    .gc-btn{width:100%;padding:16px;background:#c9a84c;border:none;border-radius:50px;color:#fff;font-family:'Dela Gothic One',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .2s;box-shadow:0 4px 0 #a07c28}
    .gc-btn:hover{background:#e0be6a}
    .gc-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #a07c28}
    /* アニメーション */
    .gc-anim{display:none;text-align:center;padding:20px 20px 30px}
    .gc-anim-wrap{position:relative;width:140px;height:200px;margin:0 auto}
    .gc-ball-drop{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:28px;height:28px;
      border-radius:50%;
      top:108px;
      opacity:0;
    }
    .gc-ball-drop.go{animation:ballDrop 1.4s cubic-bezier(.25,.46,.45,.94) forwards}
    @keyframes ballDrop{
      0%{top:108px;opacity:0;transform:translateX(-50%) scale(0.5)}
      15%{opacity:1;transform:translateX(-50%) scale(1)}
      60%{top:155px;opacity:1;transform:translateX(-50%) scale(0.95)}
      75%{top:148px;opacity:1;transform:translateX(-50%) scale(1.1)}
      90%{top:158px;opacity:1;transform:translateX(-50%) scale(0.9)}
      100%{top:155px;opacity:1;transform:translateX(-50%) scale(1)}
    }
    .gc-anim-text{font-size:13px;color:#c9a84c;letter-spacing:2px;margin-top:8px}
    /* 結果 */
    .gc-result{display:none;padding:0 20px}
    .gc-destiny-label{text-align:center;font-size:11px;color:#c9a84c;letter-spacing:3px;margin:16px 0 10px;font-weight:700}
    .gc-result-card{background:#faf7f2;border:1.5px solid #c9a84c;border-radius:16px;padding:20px;margin-bottom:16px}
    .gc-result-name{font-family:'Dela Gothic One',sans-serif;font-size:20px;color:#2a2a2a;text-align:center;margin-bottom:16px;letter-spacing:1px}
    .gc-result-row{font-size:12px;color:#888;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start}
    .gc-result-row span{color:#2a2a2a}
    .gc-reason{margin-top:14px;padding-top:12px;border-top:1px dashed #c9a84c44;font-size:12px;color:#888;line-height:1.7}
    .gc-reason span{color:#2a2a2a}
    .gc-go-btn{width:100%;padding:14px;background:#c9a84c;border:none;border-radius:50px;color:#fff;font-family:'Dela Gothic One',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 0 #a07c28}
    .gc-redraw-btn{width:100%;padding:10px;background:transparent;border:1.5px solid #c9a84c55;border-radius:50px;color:#c9a84c;font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;margin-bottom:8px}
    .gc-reset-btn{width:100%;padding:10px;background:transparent;border:1.5px solid #c9a84c55;border-radius:50px;color:#c9a84c;font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer}
  </style>
</head>
<body>
<div class="gc-wrap">
  <div class="gc-machine">
    <div class="gc-header">
      <p class="gc-title">ガチャンコ</p>
    </div>

    <!-- トップ・結果画面のガチャ静止画像 -->
    <div class="gc-globe-area" id="globe-static">
      <svg width="140" height="160" viewBox="0 0 140 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="30" y="112" width="80" height="44" rx="8" fill="#e8624a"/>
        <rect x="24" y="108" width="92" height="12" rx="6" fill="#e8624a"/>
        <rect x="46" y="128" width="48" height="20" rx="10" fill="#c94a34"/>
        <ellipse cx="70" cy="138" rx="18" ry="7" fill="#d4d4d4"/>
        <circle cx="70" cy="62" r="54" fill="#d6f0f8" stroke="#b0d8e8" stroke-width="2"/>
        <circle cx="48" cy="72" r="13" fill="#4ab8e8"/><path d="M48 59 Q55 66 48 72" fill="#e84a4a"/><path d="M48 72 Q41 78 48 85" fill="#4ae84a"/>
        <circle cx="70" cy="78" r="13" fill="#4ab8e8"/><path d="M70 65 Q77 72 70 78" fill="#f0c030"/><path d="M70 78 Q63 84 70 91" fill="#e84a4a"/>
        <circle cx="92" cy="72" r="13" fill="#4ab8e8"/><path d="M92 59 Q99 66 92 72" fill="#4ae84a"/><path d="M92 72 Q85 78 92 85" fill="#2040e8"/>
        <circle cx="56" cy="54" r="11" fill="#4ab8e8"/><path d="M56 43 Q63 49 56 54" fill="#e84a4a"/><path d="M56 54 Q49 60 56 65" fill="#f0c030"/>
        <circle cx="84" cy="54" r="11" fill="#4ab8e8"/><path d="M84 43 Q91 49 84 54" fill="#2040e8"/><path d="M84 54 Q77 60 84 65" fill="#4ae84a"/>
        <ellipse cx="52" cy="30" rx="10" ry="6" fill="white" opacity="0.6"/>
        <rect x="58" y="114" width="24" height="8" fill="#c9a84c"/>
        <rect x="54" y="110" width="32" height="6" rx="3" fill="#c9a84c"/>
      </svg>
    </div>

    <div class="gc-body" id="form-area">
      <div class="gc-section">
        <span class="gc-label">🚶 距離</span>
        <select class="gc-select" id="distance">
          <option value="500">500m以内（すぐそこ）</option>
          <option value="1000" selected>1000m以内（徒歩圏内）</option>
          <option value="3000">3000m以内（ちょい遠め）</option>
        </select>
      </div>
      <div class="gc-section">
        <span class="gc-label">👥 人数</span>
        <div class="gc-people-row">
          <div class="gc-counter">
            <div class="gc-counter-label">👨 男性</div>
            <div class="gc-counter-ctrl">
              <button class="gc-cnt-btn" onclick="change('male',-1)">−</button>
              <span><span class="gc-cnt-val" id="male-val">0</span><span class="gc-cnt-unit">人</span></span>
              <button class="gc-cnt-btn" onclick="change('male',1)">＋</button>
            </div>
          </div>
          <div class="gc-counter">
            <div class="gc-counter-label">👩 女性</div>
            <div class="gc-counter-ctrl">
              <button class="gc-cnt-btn" onclick="change('female',-1)">−</button>
              <span><span class="gc-cnt-val" id="female-val">0</span><span class="gc-cnt-unit">人</span></span>
              <button class="gc-cnt-btn" onclick="change('female',1)">＋</button>
            </div>
          </div>
        </div>
      </div>
      <div class="gc-section">
        <span class="gc-label">🍽️ カテゴリー</span>
        <div class="gc-tags">
          <button class="gc-tag on" onclick="setTag(this,'カフェ')">カフェ</button>
          <button class="gc-tag" onclick="setTag(this,'スイーツ')">スイーツ</button>
          <button class="gc-tag" onclick="setTag(this,'ランチ')">ランチ</button>
          <button class="gc-tag" onclick="setTag(this,'ディナー')">ディナー</button>
          <button class="gc-tag" onclick="setTag(this,'サク飲み')">サク飲み</button>
          <button class="gc-tag" onclick="setTag(this,'ガッツリ')">ガッツリ</button>
        </div>
        <input type="hidden" id="category" value="カフェ">
      </div>
      <div class="gc-section">
        <span class="gc-label">💭 気分・フリーワード</span>
        <input class="gc-input" type="text" id="freeword" placeholder="例：静か、おしゃれ、和食...">
      </div>
      <hr class="gc-divider">
      <button class="gc-btn" onclick="drawGacha(false)">お店を探す</button>
    </div>

    <!-- アニメーション（ガチャ1つ＋玉が落ちる） -->
    <div class="gc-anim" id="anim-area">
      <div class="gc-anim-wrap">
        <svg width="140" height="160" viewBox="0 0 140 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="30" y="112" width="80" height="44" rx="8" fill="#e8624a"/>
          <rect x="24" y="108" width="92" height="12" rx="6" fill="#e8624a"/>
          <rect x="46" y="128" width="48" height="20" rx="10" fill="#c94a34"/>
          <ellipse cx="70" cy="138" rx="18" ry="7" fill="#d4d4d4"/>
          <circle cx="70" cy="62" r="54" fill="#d6f0f8" stroke="#b0d8e8" stroke-width="2"/>
          <circle cx="48" cy="72" r="13" fill="#4ab8e8"/><path d="M48 59 Q55 66 48 72" fill="#e84a4a"/><path d="M48 72 Q41 78 48 85" fill="#4ae84a"/>
          <circle cx="70" cy="78" r="13" fill="#4ab8e8"/><path d="M70 65 Q77 72 70 78" fill="#f0c030"/><path d="M70 78 Q63 84 70 91" fill="#e84a4a"/>
          <circle cx="92" cy="72" r="13" fill="#4ab8e8"/><path d="M92 59 Q99 66 92 72" fill="#4ae84a"/><path d="M92 72 Q85 78 92 85" fill="#2040e8"/>
          <circle cx="56" cy="54" r="11" fill="#4ab8e8"/><path d="M56 43 Q63 49 56 54" fill="#e84a4a"/><path d="M56 54 Q49 60 56 65" fill="#f0c030"/>
          <circle cx="84" cy="54" r="11" fill="#4ab8e8"/><path d="M84 43 Q91 49 84 54" fill="#2040e8"/><path d="M84 54 Q77 60 84 65" fill="#4ae84a"/>
          <ellipse cx="52" cy="30" rx="10" ry="6" fill="white" opacity="0.6"/>
          <rect x="58" y="114" width="24" height="8" fill="#c9a84c"/>
          <rect x="54" y="110" width="32" height="6" rx="3" fill="#c9a84c"/>
        </svg>
        <div class="gc-ball-drop" id="ball-drop"></div>
      </div>
      <p class="gc-anim-text" id="anim-text">ｶﾞﾗｶﾞﾗｶﾞﾗ... お店を選定しています...</p>
    </div>

    <div class="gc-result" id="result-area">
      <p class="gc-destiny-label">— YOUR DESTINY —</p>
      <div class="gc-result-card">
        <p class="gc-result-name" id="r-name"></p>
        <div class="gc-result-row">📍 住所：<span id="r-address"></span></div>
        <div class="gc-result-row">🏷️ ジャンル：<span id="r-genre"></span></div>
        <div class="gc-result-row">👥 人数：<span id="r-people"></span></div>
        <div class="gc-reason">💡 運命の理由<br><span id="r-reason"></span></div>
      </div>
      <button class="gc-go-btn" id="go-btn">マップを開く</button>
      <button class="gc-redraw-btn" id="redraw-btn" onclick="drawGacha(true)">引き直す</button>
      <button class="gc-reset-btn" onclick="resetForm()">再設定する</button>
    </div>
  </div>
</div>
<script>
  const ballColors=['#e84a4a','#4ae84a','#f0c030','#4ab8e8','#e87840','#a04ae8'];
  let counts={male:0,female:0};
  function change(type,delta){counts[type]=Math.max(0,counts[type]+delta);document.getElementById(type+'-val').textContent=counts[type]}
  function setTag(btn,val){document.querySelectorAll('.gc-tag').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('category').value=val}
  function resetForm(){
    document.getElementById('result-area').style.display='none';
    document.getElementById('redraw-btn').style.display='block';
    document.getElementById('globe-static').style.display='flex';
    document.getElementById('form-area').style.display='block';
  }
  function startBallAnim(){
    const ball=document.getElementById('ball-drop');
    const color=ballColors[Math.floor(Math.random()*ballColors.length)];
    ball.style.background=color;
    ball.style.boxShadow='inset -4px -4px 8px rgba(0,0,0,0.2), inset 3px 3px 6px rgba(255,255,255,0.4)';
    ball.classList.remove('go');
    void ball.offsetWidth;
    ball.classList.add('go');
  }
  function drawGacha(isRedraw){
    document.getElementById('globe-static').style.display='none';
    document.getElementById('form-area').style.display='none';
    document.getElementById('result-area').style.display='none';
    document.getElementById('anim-area').style.display='block';
    document.getElementById('anim-text').textContent=isRedraw?'ｶﾞﾗｶﾞﾗｶﾞﾗ... もう一度お店を選定しています...':'ｶﾞﾗｶﾞﾗｶﾞﾗ... お店を選定しています...';
    startBallAnim();
    navigator.geolocation.getCurrentPosition(async function(position){
      const lat=position.coords.latitude;
      const lng=position.coords.longitude;
      const distance=document.getElementById('distance').value;
      const category=document.getElementById('category').value;
      const freeword=document.getElementById('freeword').value;
      try{
        const response=await fetch('/api/gacha',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({lat,lng,distance,category,freeword})
        });
        const data=await response.json();
        setTimeout(function(){
          document.getElementById('anim-area').style.display='none';
          if(response.ok){
            document.getElementById('r-name').textContent=data.name;
            document.getElementById('r-address').textContent=data.address;
            document.getElementById('r-genre').textContent=category;
            const m=counts.male,f=counts.female;
            document.getElementById('r-people').textContent='男性'+m+'人・女性'+f+'人（計'+(m+f)+'人）';
            document.getElementById('r-reason').textContent=data.reason;
            document.getElementById('go-btn').onclick=function(){window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(data.name),'_blank')};
            document.getElementById('globe-static').style.display='flex';
            document.getElementById('result-area').style.display='block';
            if(isRedraw)document.getElementById('redraw-btn').style.display='none';
          }else{
            alert(data.message);
            resetForm();
          }
        },1500);
      }catch(e){
        alert('通信エラーが発生しました。');
        resetForm();
      }
    },function(){
      alert('位置情報の取得に失敗しました。');
      resetForm();
    });
  }
</script>
</body>
</html>
