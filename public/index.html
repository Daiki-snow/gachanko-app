<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GACHANKO - 運命決定ガチャ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            /* 淡いピンクベージュのグラデーション背景 */
            background: linear-gradient(135deg, #fdfbf7 0%, #faecec 100%); 
            color: #5a4b46; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            width: 100%;
            max-width: 380px; 
            margin: 0 auto; 
        }
        
        /* タイトル周り */
        h1 { 
            font-family: 'Cinzel', serif; 
            color: #b58d8d; 
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 0px; 
            font-weight: 600;
        }
        p.subtitle { 
            font-size: 11px; 
            color: #8c7b75; 
            margin-top: 5px; 
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* グラスモーフィズム調のカード */
        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 8px 32px rgba(181, 141, 141, 0.15);
        }

        .input-group { 
            text-align: left; 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            font-size: 12px; 
            margin-bottom: 8px; 
            color: #7a6b65;
            font-weight: 500;
        }
        
        /* 入力フォームの装飾 */
        select, input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            font-size: 14px; 
            border-radius: 12px; 
            border: 1px solid #e8d5d5; 
            background: rgba(255, 255, 255, 0.9); 
            color: #5a4b46; 
            box-sizing: border-box; 
            font-family: inherit;
        }
        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #c9a5a5;
        }

        /* ピル型のカテゴリーボタン */
        .category-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .cat-btn {
            background: transparent;
            border: 1px solid #d4c1c1;
            color: #8c7b75;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .cat-btn.active {
            background: #c9a5a5;
            border-color: #c9a5a5;
            color: white;
            font-weight: 500;
        }

        /* メインボタン */
        .btn-main { 
            background: linear-gradient(135deg, #d3a9a9 0%, #b88686 100%);
            color: white; 
            width: 100%; 
            padding: 16px; 
            margin-top: 15px; 
            font-size: 16px; 
            border-radius: 30px; 
            border: none; 
            font-weight: 700; 
            letter-spacing: 1px;
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(184, 134, 134, 0.4);
            transition: 0.3s; 
        }
        .btn-main:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 134, 134, 0.6);
        }

        /* アニメーション・結果画面 */
        #animation { display: none; margin: 40px 0; font-size: 16px; color: #b58d8d; letter-spacing: 2px; }
        .spinner {
            width: 50px; height: 50px; margin: 0 auto 20px auto;
            border: 4px solid #f3ecec; border-top: 4px solid #c9a5a5;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #result { display: none; }
        #result h2 { font-size: 20px; color: #5a4b46; font-weight: normal; margin-bottom: 20px;}
        
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(181, 141, 141, 0.1);
            text-align: left;
            margin-bottom: 20px;
        }
        .result-name { font-size: 22px; font-weight: bold; color: #4a3b32; margin-bottom: 15px; text-align: center;}
        .result-item { font-size: 13px; margin-bottom: 8px; color: #7a6b65; display: flex; align-items: flex-start;}
        .result-item-icon { width: 20px; margin-right: 5px; opacity: 0.7;}
        
        .reason-box { margin-top: 20px; padding-top: 15px; border-top: 1px dashed #e8d5d5; font-size: 13px; color: #8c7b75; line-height: 1.6;}

        .btn-sub { 
            background: transparent; 
            color: #8c7b75; 
            border: none;
            font-size: 13px;
            text-decoration: underline;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GACHANKO</h1>
        <p class="subtitle">DESTINY ROULETTE<br>運命決定ガチャ</p>
        
        <div id="form-area" class="card">
            <div class="input-group">
                <label>🚶 距離</label>
                <select id="distance">
                    <option value="500">500m以内（すぐそこ）</option>
                    <option value="1000" selected>1000m以内（徒歩圏内）</option>
                    <option value="3000">3000m以内（タクシー推奨）</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>🍽️ カテゴリー</label>
                <div class="category-tags">
                    <button class="cat-btn active" onclick="setCategory(this, 'カフェ')">カフェ</button>
                    <button class="cat-btn" onclick="setCategory(this, 'スイーツ')">スイーツ</button>
                    <button class="cat-btn" onclick="setCategory(this, 'ランチ')">ランチ</button>
                    <button class="cat-btn" onclick="setCategory(this, 'ディナー')">ディナー</button>
                    <button class="cat-btn" onclick="setCategory(this, 'サク飲み')">サク飲み</button>
                </div>
                <input type="hidden" id="category" value="カフェ">
            </div>

            <div class="input-group">
                <label>💭 気分・フリーワード</label>
                <input type="text" id="freeword" placeholder="例：静か、おしゃれ、和食...">
            </div>

            <button class="btn-main" id="submit-btn" onclick="drawGacha(false)">これだっ！<br><span style="font-size: 11px; font-weight: normal;">(後戻りできません)</span></button>
        </div>

        <div id="animation">
            <div class="spinner"></div>
            <span id="anim-text">運命を紡いでいます...</span>
        </div>

        <div id="result">
            <h2>あなたの運命は…</h2>
            <div class="result-card">
                <div class="result-name" id="r-name"></div>
                <div class="result-item"><span class="result-item-icon">📍</span> <span id="r-address"></span></div>
                <div class="result-item"><span class="result-item-icon">🏷️</span> ジャンル：<span id="r-genre"></span></div>
                
                <div class="reason-box">
                    💡 運命の理由<br>
                    <span id="r-reason"></span>
                </div>
            </div>
            
            <button class="btn-main" onclick="openMap()">今すぐ行け</button>
            <button class="btn-sub" id="redraw-btn" onclick="drawGacha(true)">引き直す (Coward?)</button>
        </div>
    </div>

    <script>
        // カテゴリーボタンの切り替え処理
        function setCategory(btn, value) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('category').value = value;
        }

        let currentDestination = "";

        async function drawGacha(isRedraw) {
            const formArea = document.getElementById('form-area');
            const resultDiv = document.getElementById('result');
            const animDiv = document.getElementById('animation');
            const animText = document.getElementById('anim-text');
            
            const distance = document.getElementById('distance').value;
            const category = document.getElementById('category').value;
            const freeword = document.getElementById('freeword').value;

            formArea.style.display = 'none';
            resultDiv.style.display = 'none';
            animDiv.style.display = 'block';

            if (isRedraw) {
                animText.innerHTML = "運命に逆らうのですね…<br>もう一度だけ回しましょう。";
            } else {
                animText.innerHTML = "運命を紡いでいます...";
            }

            if (!navigator.geolocation) {
                alert('位置情報に対応していません。');
                location.reload();
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                try {
                    const response = await fetch('/api/gacha', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lat, lng, distance, category, freeword })
                    });

                    const data = await response.json();

                    setTimeout(() => {
                        animDiv.style.display = 'none';
                        if (response.ok) {
                            document.getElementById('r-name').innerText = data.name;
                            document.getElementById('r-address').innerText = data.address;
                            document.getElementById('r-genre').innerText = category;
                            document.getElementById('r-reason').innerText = data.reason;
                            
                            // マップ検索用に店舗名を保存
                            currentDestination = data.name;

                            resultDiv.style.display = 'block';
                            
                            if(isRedraw) {
                                document.getElementById('redraw-btn').style.display = 'none';
                            }
                        } else {
                            alert(data.message
